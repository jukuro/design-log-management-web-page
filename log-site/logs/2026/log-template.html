<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- ★ タイトルを変更する（「ログタイトル | ログ管理」の形式） -->
  <title>ログタイトル | ログ管理</title>
  <!-- ★ 深さに応じてパスを調整（logs/2026/ の場合は ../../ が正） -->
  <link rel="stylesheet" href="../../assets/css/style.css">
  <link rel="stylesheet" href="../../assets/css/detail.css">
</head>
<body>

  <header class="site-header">
    <div class="container header-inner">
      <div>
        <a href="../../index.html" class="back-link">← 一覧に戻る</a>
        <h1 class="site-title">📋 ログ管理</h1>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div class="container">
      <article class="post-detail">

        <!-- ===== ヘッダー部 ===== -->
        <div class="post-detail-header">
          <div class="post-detail-meta">
            <!--
              ★ 大分類バッジ: style の色を変える
                 仕事      → background:#dbeafe;color:#2563eb
                 地区活動  → background:#ffedd5;color:#ea580c
                 ランニング → background:#fee2e2;color:#dc2626
                 HINOVA    → background:#e0e7ff;color:#4f46e5
                 Terrace J → background:#fef3c7;color:#d97706
                 健康      → background:#cffafe;color:#0891b2
                 趣味      → background:#dcfce7;color:#16a34a
                 学習      → background:#ede9fe;color:#7c3aed
                 家族      → background:#fce7f3;color:#db2777
            -->
            <span class="badge" style="background:#dbeafe;color:#2563eb">大分類</span>
            <!-- ★ 中分類（不要なら削除） -->
            <span class="badge badge-sub">中分類</span>
            <!-- ★ 年度 -->
            <span class="badge badge-year">2026年度</span>
          </div>

          <!-- ★ タイトル -->
          <h1 class="post-detail-title">ここにタイトルを書く</h1>

          <!-- ★ 日付（YYYY-MM-DD 形式） -->
          <p class="post-detail-date">📅 2026-01-01</p>

          <!-- ★ タグ（複数追加可） -->
          <div class="post-tags">
            <span class="tag">タグ1</span>
            <span class="tag">タグ2</span>
            <span class="tag">タグ3</span>
          </div>
        </div>
        <!-- /ヘッダー部 -->

        <!-- ===== 概要（1〜2文で要旨を書く） ===== -->
        <div class="post-summary-box">
          ここに概要を書く（1〜2文。一覧画面にも表示される）。
        </div>

        <!-- ===== 本文 ===== -->
        <div class="post-body">

          <h2>見出し1</h2>
          <p>本文テキストをここに書く。</p>

          <h2>見出し2</h2>
          <p>箇条書きの例:</p>
          <ul>
            <li>項目1</li>
            <li>項目2</li>
            <li>項目3</li>
          </ul>

          <h2>見出し3</h2>
          <p>番号付きリストの例:</p>
          <ol>
            <li>手順1</li>
            <li>手順2</li>
            <li>手順3</li>
          </ol>

          <!-- 見出しは h2 / h3 の2段階で使い分ける -->
          <h3>小見出し</h3>
          <p>補足テキスト。</p>

        </div>
        <!-- /本文 -->

        <!-- ===== 添付・関連リンク（不要なら削除） ===== -->
        <div class="post-attachments">
          <h3>関連リンク・添付</h3>
          <ul>
            <li><a href="#">添付資料（PDF等）</a></li>
            <li><a href="#">関連ページ</a></li>
            <li><a href="../../index.html">← ログ一覧に戻る</a></li>
          </ul>
        </div>

      </article>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-back">
      <a href="../../index.html">← 一覧に戻る</a>
      &nbsp;|&nbsp; ログ管理システム
    </div>
  </footer>

</body>
</html>
