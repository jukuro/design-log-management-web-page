<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログ管理</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <header class="site-header">
    <div class="container header-inner">
      <div>
        <h1 class="site-title">📋 ログ管理</h1>
        <p class="site-subtitle">記録・整理・検索</p>
      </div>
    </div>
  </header>

  <nav class="quick-nav">
    <div class="container">
      <div class="quick-nav-list">
        <button class="quick-btn" data-category="仕事">💼 仕事</button>
        <button class="quick-btn" data-category="地区活動">🏘️ 地区活動</button>
        <button class="quick-btn" data-category="ランニング">🏃 ランニング</button>
        <button class="quick-btn" data-category="HINOVA">🏢 HINOVA</button>
        <button class="quick-btn" data-category="Terrace J">🏡 Terrace J</button>
        <button class="quick-btn" data-category="健康">💪 健康</button>
        <button class="quick-btn" data-recent="true">🕐 最近の記録</button>
        <button class="quick-btn" data-reset="true">📋 全件表示</button>
      </div>
    </div>
  </nav>

  <main class="main-content">
    <div class="container">

      <section class="filter-section">
        <div class="search-bar">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-input" placeholder="タイトル・概要・本文・タグ でキーワード検索..." class="search-input">
        </div>
        <div class="filter-row">
          <select id="filter-category" class="filter-select">
            <option value="">📁 大分類</option>
          </select>
          <select id="filter-subcategory" class="filter-select">
            <option value="">📂 中分類</option>
          </select>
          <select id="filter-year" class="filter-select">
            <option value="">📅 年度</option>
          </select>
          <select id="filter-tag" class="filter-select">
            <option value="">🏷️ タグ</option>
          </select>
          <button id="clear-filters" class="btn-clear">✕ クリア</button>
        </div>
        <div id="active-filters" class="active-filters"></div>
      </section>

      <section class="results-section">
        <div id="results-count" class="results-count"></div>
        <div id="post-list" class="post-list">
          <div class="loading">読み込み中...</div>
        </div>
      </section>

    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>ログ管理システム &nbsp;|&nbsp; GitHub Pages</p>
    </div>
  </footer>

  <script src="assets/js/main.js"></script>
</body>
</html>
